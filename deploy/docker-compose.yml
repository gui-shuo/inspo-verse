services:
  nginx:
    image: nginx:1.27-alpine
    container_name: inspo-nginx
    ports:
      - "80:80"
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - java-api
      - python-ai
    networks:
      - inspo-net

  java-api:
    build:
      context: ../backend/java-api
    container_name: inspo-java-api
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: inspo_verse
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mysql
      - redis
    networks:
      - inspo-net

  python-ai:
    build:
      context: ../backend/python-ai
    container_name: inspo-python-ai
    environment:
      AI_INTERNAL_SIGN_KEY: ${AI_INTERNAL_SIGN_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - inspo-net

  mysql:
    image: mysql:8.4
    container_name: inspo-mysql
    # Temporary compatibility setting for legacy clients; migrate to caching_sha2_password when possible (more secure).
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: inspo_verse
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - inspo-net

  redis:
    image: redis:7.4-alpine
    container_name: inspo-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - inspo-net

volumes:
  mysql-data:
  redis-data:

networks:
  inspo-net:
    driver: bridge
