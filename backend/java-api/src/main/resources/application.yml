server:
  port: 8080

spring:
  application:
    name: inspo-java-api

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB       # 单文件最大 10MB（头像 ≤5MB，创作 ≤50MB 在业务层校验）
      max-request-size: 60MB   # 单次请求最大 60MB（创作文件上传）

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/inspo_verse?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: inspo-verse-jwt-secret-key-2026-change-in-production
  expiration-ms: 86400000  # 24小时
  refresh-expiration-ms: 604800000  # 7天

management:
  endpoints:
    web:
      exposure:
        include: health,info

# 阿里云 OSS 配置（生产环境通过环境变量注入）
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:inspo-verse}
    domain: ${OSS_DOMAIN:}   # CDN自定义域名，空则使用OSS默认域名
    enabled: ${OSS_ENABLED:false}  # false时退回本地文件存储

# 本地文件存储（开发模式）
local:
  upload:
    path: ${LOCAL_UPLOAD_PATH:/tmp/inspo-uploads}
    base-url: ${LOCAL_BASE_URL:http://localhost:8080/uploads}

# Python AI 服务配置
ai:
  python-service:
    base-url: ${AI_PYTHON_BASE_URL:http://localhost:9000}
    internal-sign-key: ${AI_INTERNAL_SIGN_KEY:}
    connect-timeout-ms: 5000
    read-timeout-ms: 120000

# OAuth 配置
oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:5173/oauth/github/callback}
  discord:
    client-id: ${DISCORD_CLIENT_ID:}
    client-secret: ${DISCORD_CLIENT_SECRET:}
    redirect-uri: ${DISCORD_REDIRECT_URI:http://localhost:5173/oauth/discord/callback}

