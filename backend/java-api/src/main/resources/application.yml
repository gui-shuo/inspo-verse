server:
  port: 8080

spring:
  application:
    name: inspo-java-api

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 60MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:inspo_verse}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  # 邮件服务配置
  mail:
    host: ${MAIL_HOST:smtp.163.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          ssl:
            enable: true
          auth: true
    default-encoding: UTF-8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:inspo-verse-jwt-secret-key-2026-change-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# 腾讯云 COS 对象存储配置
tencent:
  cos:
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-beijing}
    bucket: ${COS_BUCKET:}
    enabled: ${COS_ENABLED:false}

# 本地文件存储（COS 未启用时的回退方案）
local:
  upload:
    path: ${LOCAL_UPLOAD_PATH:/tmp/inspo-uploads}
    base-url: ${LOCAL_BASE_URL:http://localhost:8080/uploads}

# Python AI 服务配置
ai:
  python-service:
    base-url: ${AI_PYTHON_BASE_URL:http://localhost:9000}
    internal-sign-key: ${AI_INTERNAL_SIGN_KEY:}

# 百度 AI 配置
baidu:
  ai:
    app-id: ${BAIDU_AI_APP_ID:}
    api-key: ${BAIDU_AI_API_KEY:}
    secret-key: ${BAIDU_AI_SECRET_KEY:}

# 邮件昵称
mail:
  nickname: ${MAIL_NICKNAME:Inspo-Verse}

# CORS 跨域配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ─── 支付配置 ────────────────────────────────────────────────────────────────
app:
  payment:
    mock-mode: ${PAYMENT_MOCK_MODE:true}
    notify-base-url: ${PAYMENT_NOTIFY_BASE_URL:http://localhost:8080}

    # 第三方易支付（Epay）
    epay:
      merchant-id: ${EPAY_MERCHANT_ID:}
      merchant-key: ${EPAY_MERCHANT_KEY:}
      api-url: ${EPAY_API_URL:}
      submit-url: ${EPAY_SUBMIT_URL:}
      mapi-url: ${EPAY_MAPI_URL:}

    connect-timeout-ms: 5000
    read-timeout-ms: 120000

# OAuth 配置
oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:5173/oauth/github/callback}
  discord:
    client-id: ${DISCORD_CLIENT_ID:}
    client-secret: ${DISCORD_CLIENT_SECRET:}
    redirect-uri: ${DISCORD_REDIRECT_URI:http://localhost:5173/oauth/discord/callback}

