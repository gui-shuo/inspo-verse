# ============================================
# Inspo-Verse 生产环境 Docker Compose
# ============================================
# 使用方式：
#   1. 在服务器 /www/wwwroot/Inspo-Verse 下放置 .env 文件
#   2. docker compose -p inspo-verse -f docker-compose.prod.yml up -d
#
# ⚠️ 同服务器共存项目：nutriai（-p nutriai，占用 3000/8080）
#    本项目使用 3001/8081 端口，各自独立 Redis，互不干扰
# ============================================
name: inspo-verse

services:
  # ==================== 前端 (Nginx + Vue SPA) ====================
  inspo-frontend:
    image: crpi-j4jyart51tb8fixi.cn-hongkong.personal.cr.aliyuncs.com/${TCR_NAMESPACE}/inspo-frontend:latest
    container_name: inspo-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      inspo-backend:
        condition: service_healthy
    networks:
      - inspo-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==================== Java 后端 (Spring Boot) ====================
  inspo-backend:
    image: crpi-j4jyart51tb8fixi.cn-hongkong.personal.cr.aliyuncs.com/${TCR_NAMESPACE}/inspo-backend:latest
    container_name: inspo-backend
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      inspo-redis:
        condition: service_healthy
    environment:
      # --- 数据库 (腾讯云 MySQL) ---
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      # --- Redis（本项目独立 Redis，使用 db0）---
      - REDIS_HOST=inspo-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_DATABASE=0
      # --- JWT ---
      - JWT_SECRET=${JWT_SECRET}
      # --- AI Python 服务（容器内网） ---
      - AI_PYTHON_BASE_URL=http://inspo-ai:9000
      - AI_INTERNAL_SIGN_KEY=${AI_INTERNAL_SIGN_KEY}
      # --- 腾讯云 COS ---
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_REGION=${COS_REGION}
      - COS_BUCKET=${COS_BUCKET}
      - COS_ENABLED=true
      # --- 百度 AI ---
      - BAIDU_AI_APP_ID=${BAIDU_AI_APP_ID}
      - BAIDU_AI_API_KEY=${BAIDU_AI_API_KEY}
      - BAIDU_AI_SECRET_KEY=${BAIDU_AI_SECRET_KEY}
      # --- 邮件 ---
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_NICKNAME=${MAIL_NICKNAME}
      # --- CORS ---
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      # --- 第三方支付 (Epay) ---
      - EPAY_MERCHANT_ID=${EPAY_MERCHANT_ID}
      - EPAY_MERCHANT_KEY=${EPAY_MERCHANT_KEY}
      - EPAY_API_URL=${EPAY_API_URL}
      - EPAY_SUBMIT_URL=${EPAY_SUBMIT_URL}
      - EPAY_MAPI_URL=${EPAY_MAPI_URL}
      - PAYMENT_MOCK_MODE=false
      - PAYMENT_NOTIFY_BASE_URL=${PAYMENT_NOTIFY_BASE_URL}
      # --- MyBatis 日志（生产关闭 SQL 打印）---
      - MYBATIS_LOG_IMPL=org.apache.ibatis.logging.nologging.NoLoggingImpl
    volumes:
      - backend-uploads:/tmp/inspo-uploads
    networks:
      - inspo-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ==================== Python AI 服务 (FastAPI) ====================
  inspo-ai:
    image: crpi-j4jyart51tb8fixi.cn-hongkong.personal.cr.aliyuncs.com/${TCR_NAMESPACE}/inspo-ai:latest
    container_name: inspo-ai
    restart: unless-stopped
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL}
      - AI_INTERNAL_SIGN_KEY=${AI_INTERNAL_SIGN_KEY}
    volumes:
      - ai-uploads:/tmp/inspo-ai-uploads
    networks:
      - inspo-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ==================== Redis（本项目独立实例）====================
  # 与 nutriai 各自独立 Redis，互不依赖
  inspo-redis:
    image: redis:7-alpine
    container_name: inspo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - inspo-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

# ==================== 数据卷 ====================
volumes:
  redis-data:
    driver: local
  backend-uploads:
    driver: local
  ai-uploads:
    driver: local

# ==================== 网络（独立网段，与 nutriai 完全隔离）====================
networks:
  inspo-net:
    driver: bridge
